<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple Ecommerce — API Tester</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body{background:#f7f9fb}
      .card{box-shadow:0 2px 6px rgba(0,0,0,0.06)}
      pre.json {white-space:pre-wrap;word-break:break-word;max-height:420px;overflow:auto}
      .status-badge {font-weight:600}
      .product-card img{max-height:160px;object-fit:cover;width:100%;border-radius:6px}
    </style>
  </head>
  <body>
    <div class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h4">Simple Ecommerce — API Tester</h1>
        <small class="text-muted">Development only — not for production</small>
      </div>

      <div class="row g-3">
        <div class="col-lg-5">
          <div class="card p-3 mb-3">
            <h5 class="mb-3">User Endpoints</h5>
            <div class="mb-2">
              <label class="form-label">Name</label>
              <input id="reg-name" class="form-control" value="Test User">
            </div>
            <div class="mb-2">
              <label class="form-label">Email</label>
              <input id="reg-email" class="form-control" value="test-browser@example.com">
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input id="reg-pass" class="form-control" value="Roshan@123">
            </div>
            <div class="d-flex gap-2">
              <button id="btn-register" class="btn btn-primary">POST /api/auth/register</button>
              <button id="btn-login" class="btn btn-outline-secondary">POST /api/auth/login</button>
            </div>
          </div>

          <div class="card p-3">
            <h5 class="mb-3">Products — Create / Update / Delete</h5>
            <div class="mb-2">
              <button id="btn-get-products" class="btn btn-success me-2">Refresh products</button>
            </div>
            <form id="product-form" class="mb-2">
              <div class="row g-2">
                <input id="p-id" type="hidden">
                <div class="col-12">
                  <input id="p-name" class="form-control" placeholder="Product name" required>
                </div>
                <div class="col-12">
                  <input id="p-category" class="form-control" placeholder="Category">
                </div>
                <div class="col-12">
                  <input id="p-image" class="form-control" placeholder="Image URL (optional)">
                </div>
                <div class="col-6">
                  <input id="p-price" class="form-control" placeholder="Price" type="number" step="0.01">
                </div>
                <div class="col-6">
                  <input id="p-stock" class="form-control" placeholder="Stock" type="number">
                </div>
                <div class="col-12">
                  <textarea id="p-desc" class="form-control" placeholder="Description" rows="2"></textarea>
                </div>
              </div>
              <div class="d-flex gap-2 mt-2">
                <button id="btn-create-product" type="button" class="btn btn-primary">Create</button>
                <button id="btn-update-product" type="button" class="btn btn-warning">Update</button>
                <button id="btn-delete-product" type="button" class="btn btn-danger ms-auto">Delete (by id)</button>
              </div>
            </form>
            <div class="mb-2">
              <input id="prod-id" class="form-control" placeholder="id to load/delete" style="max-width:220px">
            </div>
          </div>
        </div>

        <div class="col-lg-7">
          <div class="card p-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h5 class="mb-0">Response</h5>
              <div><span id="status" class="badge bg-secondary status-badge">idle</span></div>
            </div>
            <div class="mb-2">
              <small class="text-muted">Click an action to see the HTTP status and JSON response below.</small>
            </div>
            <div class="mb-3">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <strong>Products</strong>
                <small class="text-muted">Render from server</small>
              </div>
              <div id="productsList" class="row g-3"></div>
            </div>
            <pre id="responseRaw" class="json p-2 bg-white border rounded">(responses will appear here)</pre>
          </div>
        </div>
      </div>
    </div>

    <script>
      const statusEl = document.getElementById('status');
      const respEl = document.getElementById('responseRaw');

      function setStatus(code, text){
        if(!code){ statusEl.textContent = 'idle'; statusEl.className = 'badge bg-secondary status-badge'; return; }
        statusEl.textContent = code + ' ' + text;
        statusEl.className = 'badge ' + (code >= 200 && code < 300 ? 'bg-success' : (code >= 400 ? 'bg-danger' : 'bg-warning')) + ' status-badge';
      }

      async function send(url, opts){
        setStatus(); respEl.textContent = 'Loading...';
        try{
          const r = await fetch(url, opts);
          const txt = await r.text();
          setStatus(r.status, r.statusText);
          try{
            const json = JSON.parse(txt);
            respEl.textContent = JSON.stringify(json, null, 2);
          } catch(e){
            respEl.textContent = txt || '(empty)';
          }
          return r;
        }catch(err){
          setStatus(); respEl.textContent = 'Network error: ' + err;
        }
      }

      document.getElementById('btn-register').addEventListener('click', ()=>{
        const body = {name:document.getElementById('reg-name').value, email:document.getElementById('reg-email').value, password:document.getElementById('reg-pass').value};
        send('/api/auth/register', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)}).then(()=>fetchProducts());
      });

      document.getElementById('btn-login').addEventListener('click', ()=>{
        const body = {email:document.getElementById('reg-email').value, password:document.getElementById('reg-pass').value};
        send('/api/auth/login', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
      });

      document.getElementById('btn-get-products').addEventListener('click', ()=> fetchProducts());

      async function fetchProducts(){
        setStatus(); respEl.textContent = 'Loading products...';
        try{
          const r = await fetch('/api/products');
          const json = await r.json();
          setStatus(r.status, r.statusText);
          renderProducts(json);
          respEl.textContent = JSON.stringify(json, null, 2);
        }catch(e){ respEl.textContent = e; }
      }

      document.getElementById('btn-create-product').addEventListener('click', async ()=>{
        const dto = readProductForm();
        await send('/api/products', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(dto)});
        fetchProducts();
      });

      document.getElementById('btn-update-product').addEventListener('click', async ()=>{
        const id = document.getElementById('p-id').value;
        if(!id){ respEl.textContent = 'Please load a product to update (click Edit).'; return; }
        const dto = readProductForm();
        await send('/api/products/' + encodeURIComponent(id), {method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(dto)});
        fetchProducts();
      });

      document.getElementById('btn-delete-product').addEventListener('click', async ()=>{
        const id = document.getElementById('prod-id').value.trim();
        if(!id){ respEl.textContent = 'Enter id to delete in the id box.'; return; }
        await send('/api/products/' + encodeURIComponent(id), {method:'DELETE'});
        fetchProducts();
      });

      function readProductForm(){
        return {
          id: document.getElementById('p-id').value || null,
          name: document.getElementById('p-name').value,
          description: document.getElementById('p-desc').value,
          price: parseFloat(document.getElementById('p-price').value) || 0,
          stockQuantity: parseInt(document.getElementById('p-stock').value) || 0,
          category: document.getElementById('p-category').value,
          imageUrl: document.getElementById('p-image').value
        };
      }

      function renderProducts(list){
        const container = document.getElementById('productsList');
        container.innerHTML = '';
        if(!Array.isArray(list) || list.length===0){ container.innerHTML = '<div class="col-12"><em class="text-muted">No products</em></div>'; return; }
        list.forEach(p => {
          const col = document.createElement('div'); col.className='col-md-6';
          const card = document.createElement('div'); card.className='card p-2 h-100 product-card';
          const img = p.imageUrl ? `<img src="${escapeHtml(p.imageUrl)}" class="mb-2">` : '';
          card.innerHTML = `\
            ${img}\
            <div class="d-flex justify-content-between align-items-start">\
              <div>\
                <h6 class="mb-1">${escapeHtml(p.name||'')}</h6>\
                <div class="text-muted small">${escapeHtml(p.category||'')}</div>\
              </div>\
              <div class="text-end">\
                <div class="fw-bold">$${(p.price||0).toFixed(2)}</div>\
                <div class="small text-muted">Stock: ${p.stockQuantity||0}</div>\
              </div>\
            </div>\
            <p class="mt-2 mb-1 small text-truncate">${escapeHtml(p.description||'')}</p>\
            <div class="d-flex gap-2 mt-2">\
              <button class="btn btn-sm btn-outline-primary btn-edit">Edit</button>\
              <button class="btn btn-sm btn-outline-danger btn-del">Delete</button>\
            </div>`;
          col.appendChild(card);
          container.appendChild(col);

          card.querySelector('.btn-edit').addEventListener('click', ()=>{
            document.getElementById('p-id').value = p.id || '';
            document.getElementById('p-name').value = p.name || '';
            document.getElementById('p-desc').value = p.description || '';
            document.getElementById('p-price').value = p.price || '';
            document.getElementById('p-stock').value = p.stockQuantity || '';
            document.getElementById('p-category').value = p.category || '';
            document.getElementById('p-image').value = p.imageUrl || '';
            document.getElementById('prod-id').value = p.id || '';
            window.scrollTo({top:0, behavior:'smooth'});
          });

          card.querySelector('.btn-del').addEventListener('click', ()=>{
            if(confirm('Delete product "' + (p.name||'') + '"?')){
              send('/api/products/' + encodeURIComponent(p.id), {method:'DELETE'}).then(()=>fetchProducts());
            }
          });
        });
      }

      function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c])); }

      // initial load
      fetchProducts();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
